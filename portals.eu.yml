# ── Job boards (aggregators) ───────────────────────────────────────────────────
# These return offers from many companies in a single fetch.
# Registered via EU-FORK in scan.mjs; providers live in parsers/.

job_boards:

  # ── JustJoin.it ─────────────────────────────────────────────────────
  # Poland's largest tech job board (10 000+ active listings).
  # NOTE: The former REST API (/api/offers) was shut down ~2024.
  # This entry uses the XML sitemap fallback (parsers/justjoin.mjs).
  # Title/company/location are heuristically derived from the URL slug;
  # use title_filter keywords to keep the pipeline to a manageable size.
  - name: JustJoin.it
    careers_url: https://justjoin.it/sitemaps/active-jobs.xml
    provider: justjoin
    enabled: true
    notes: "Polish tech job board; sitemap-based since REST API was shut down"

  # ── Remotive (category-filtered) ────────────────────────────────────
  # Remote-first job board. Each entry fetches one Remotive category so the
  # network payload stays small and the results are already pre-filtered by
  # discipline. Registered as 'remotive-cat' to avoid overwriting the
  # existing providers/remotive.mjs (full-feed) provider.

  - name: Remotive · Software Dev
    careers_url: https://remotive.com/api/remote-jobs
    provider: remotive-cat
    category: software-dev
    enabled: true
    notes: "Remotive remote jobs — software-dev category"

  - name: Remotive · DevOps / SRE
    careers_url: https://remotive.com/api/remote-jobs
    provider: remotive-cat
    category: devops-sysadmin
    enabled: true
    notes: "Remotive remote jobs — devops-sysadmin category"

  - name: Remotive · Data
    careers_url: https://remotive.com/api/remote-jobs
    provider: remotive-cat
    category: data
    enabled: true
    notes: "Remotive remote jobs — data category"

  - name: Remotive · Machine Learning
    careers_url: https://remotive.com/api/remote-jobs
    provider: remotive-cat
    category: machine-learning
    enabled: true
    notes: "Remotive remote jobs — machine-learning category"

  # NoFluffJobs — Poland-focused board. UK/DE return 0 results; scope is:
  #   (a) Polish in-office jobs, (b) fully-remote jobs listed on the PL portal
  # (accessible from anywhere in Europe).
  # One entry per category: combined queries return a smaller "best of all" subset
  # (87); per-category queries each return 200+ unique postings.

  - name: NoFluffJobs · Backend
    careers_url: https://nofluffjobs.com/pl/jobs
    provider: nofluffjobs
    nfj_categories:
      - backend
    enabled: true
    notes: "NFJ backend — Poland (in-office + remote)"

  - name: NoFluffJobs · DevOps
    careers_url: https://nofluffjobs.com/pl/jobs
    provider: nofluffjobs
    nfj_categories:
      - devops
    enabled: true
    notes: "NFJ devops — Poland (in-office + remote)"

  - name: NoFluffJobs · Fullstack
    careers_url: https://nofluffjobs.com/pl/jobs
    provider: nofluffjobs
    nfj_categories:
      - fullstack
    enabled: true
    notes: "NFJ fullstack — Poland (in-office + remote)"

  - name: NoFluffJobs · AI
    careers_url: https://nofluffjobs.com/pl/jobs
    provider: nofluffjobs
    nfj_categories:
      - artificial-intelligence
    enabled: true
    notes: "NFJ artificial-intelligence — Poland (in-office + remote)"

  - name: NoFluffJobs · Data
    careers_url: https://nofluffjobs.com/pl/jobs
    provider: nofluffjobs
    nfj_categories:
      - data
    enabled: true
    notes: "NFJ data — Poland (in-office + remote)"

  - name: NoFluffJobs · Remote Tech
    careers_url: https://nofluffjobs.com/pl/jobs
    provider: nofluffjobs
    nfj_categories:
      - backend
      - devops
      - artificial-intelligence
      - data
    nfj_remote: true
    enabled: true
    notes: "NFJ fully-remote tech jobs (combined query)"
