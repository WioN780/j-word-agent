# portals.eu.yml — EU / UK / Scandinavian company extensions
# Fork-safe: loaded alongside portals.yml by scan.mjs (EU-FORK patch).
# DO NOT edit portals.yml for EU companies — add them here instead.
#
# ATS auto-detection from careers_url:
#   Greenhouse  → job-boards(.eu)?.greenhouse.io/<slug>
#   Ashby       → jobs.ashbyhq.com/<slug>
#   Lever       → jobs.lever.co/<slug>
#   Workable    → apply.workable.com/<slug>
#   SmartRecrs  → careers.smartrecruiters.com/<slug>
#   Breezy HR   → <slug>.breezy.hr
#
# Companies marked enabled: false either:
#   - Use Workday/SAP/custom ATS (manual apply required), or
#   - Have an unconfirmed/404 ATS slug — paste their JD URL into
#     data/pipeline.md and run /career-ops pipeline to evaluate individually.
#
# To find the correct slug for a 404 company: visit their careers page,
# look at the URL — if it contains greenhouse.io, ashbyhq.com, or lever.co,
# update the careers_url and remove enabled: false.

# -- Title filter (EU-specific focus) --
# Merged (union) with portals.yml title_filter by the EU-FORK patch.

title_filter:
  positive:
    - "engineer"
    - "developer"
    - "backend"
    - "frontend"
    - "fullstack"
    - "full-stack"
    - "full stack"
    - "devops"
    - "platform"
    - "data"
    - "ml"
    - "machine learning"
    - "ai"
    - "sre"
    - "infrastructure"
    - "python"
    - "javascript"
    - "typescript"
    - "go"
    - "rust"
    - "cloud"
    - "security"
    - "software"
  negative:
    - "Head of"
    - "VP of"
    - "Director"
    - "C-level"
    - "Chief"
    - "Principal Engineer"
    - "Staff Engineer"
    - "Distinguished"
    - "10+ years"
    - "10 years experience"
    - "8+ years"
    - "intern"
    - "Intern"

